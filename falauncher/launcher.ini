; ============================================================================
;  FA Secure Launcher configuration
;  Place this file in the SAME folder as fa_launcher.exe.
; ============================================================================

[Launcher]

; The server login page shown in the embedded browser window.
; Change the host/IP/port here instead of recompiling.
;   LoginUrl=http://localhost/login
;   LoginUrl=http://192.168.1.50/login
;LoginUrl=http://localhost/login
LoginUrl=http://fa-re-srv.ddns.net

; Arguments appended after  /NET /Name:<pid>  when launching the client.
; DO NOT MODIFY!!!!!!
LaunchArgs=/MK:0 "/MCD1:0 /MCD2:0 /MTD:0 /NoPreload /PPS:5 /FPS:50 /SDM:1000"

; Size of the launcher window (the embedded login browser).
WindowWidth=460
WindowHeight=640

; --- Optional fallback client path -----------------------------------------
; The launcher normally uses the client path that the WEBSITE has stored for
; your account (sent by the server). These two keys are only used as a fallback
; if the server doesn't provide a path. You can leave them out entirely.
;GameDir=C:\games\FA
;ClientExe=FA.exe
